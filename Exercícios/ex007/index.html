<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de texto</title>
</head>
<body>
    <h1>Principais formatações</h1>
    <h2>Negrito / Destaque</h2>
    <p>bla bla bla <b>negrito</b> b</p>
<p>bla bla bla <strong>negrito semântico</strong> strong</p>
<h2>Itálico</h2>
<p>Agora tá em <i>itálico</i> i</p>
<p>agora em <em>itálico semântico</em> em (ctrl+shift+p)</p>
</body>
</html>
